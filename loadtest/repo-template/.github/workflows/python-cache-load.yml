name: python-cache-load

on:
  workflow_dispatch:
    inputs:
      matrix:
        description: JSON array of shard ids
        required: false
        default: "[1,2,3,4]"
      max_parallel:
        description: Max concurrent jobs
        required: false
        default: "4"

jobs:
  python-cache-load:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix:
        shard: ${{ fromJSON(inputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python3 scripts/python_workload.py "${{ matrix.shard }}" 220 3500
